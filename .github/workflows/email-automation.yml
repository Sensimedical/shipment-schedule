name: Daily Email Automation

on:
  schedule:
    # Run daily at 9:00 AM UTC (adjust timezone as needed)
    # This runs every day including weekends
    - cron: '0 9 * * *'
  workflow_dispatch: # Allow manual triggering

jobs:
  automate-email:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        # Allow pushing back to the repository
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Create credentials and token files from secrets
      run: |
        echo "${{ secrets.GOOGLE_CREDENTIALS_JSON }}" | base64 -d > credentials.json
        echo "${{ secrets.TOKEN_PICKLE }}" | base64 -d > token.pickle

    - name: Create data directory
      run: mkdir -p data

    - name: Run email automation
      env:
        SEARCH_SUBJECT: ${{ secrets.SEARCH_SUBJECT }}
        SEARCH_SENDER: ${{ secrets.SEARCH_SENDER }}
        TARGET_FILENAME: ${{ secrets.TARGET_FILENAME }}
        EMAIL_USER: ${{ secrets.EMAIL_USER }}
        EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
        SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
        SMTP_PORT: ${{ secrets.SMTP_PORT }}
        GIT_REMOTE: origin
        GIT_BRANCH: main
      run: python email_automation.py

    - name: Check for changes
      id: verify-changed-files
      run: |
        if [ -n "$(git status --porcelain)" ]; then
          echo "changes=true" >> $GITHUB_OUTPUT
        else
          echo "changes=false" >> $GITHUB_OUTPUT
        fi

    - name: Commit and push changes
      if: steps.verify-changed-files.outputs.changes == 'true'
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add .
        git commit -m "Auto-update: Daily email data import - $(date +'%Y-%m-%d %H:%M:%S UTC')"
        git push